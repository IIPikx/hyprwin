ShortDescription: Hyprland-inspired tiling window manager for Windows 11
Description: |-
  HyprWin brings the Hyprland tiling window manager experience to Windows 11.
  Features include BSP (Binary Space Partition) tiling, virtual workspaces,
  custom animations with bezier curves, Hyprland-style window rules,
  a configurable top bar with system monitoring widgets,
  and a TOML-based configuration with live reload.
